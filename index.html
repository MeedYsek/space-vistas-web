<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05060A" />
    <meta
      name="description"
      content="A Cathedral of Night — a scroll-driven journey through the cosmos. Stars, nebulae and deep-space vistas rendered in WebGL."
    />
    <title>A Cathedral of Night</title>

    <!-- Display + body type. Swap faces here (and in tailwind.config.js / scene.ts). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Static, no-JS fallback so the page is never a blank void. -->
    <noscript>
      <div style="color:#cdd3ff;background:#05060A;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui;padding:2rem;text-align:center">
        A Cathedral of Night is an interactive WebGL experience. Please enable JavaScript to enter.
      </div>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
